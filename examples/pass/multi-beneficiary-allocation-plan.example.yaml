policy_version: "0.3.0"

policy_id: "default-multi-beneficiary-allocation-policy-v0.3"

title: "Default Multi-Beneficiary Allocation Policy"

description: >-
  Example policy for converting approved contribution weights into provisional
  multi-beneficiary allocation amounts. This policy does not create rights,
  resolve disputes, or authorize payment.

allocation_order: "fixed_then_proportional"

fixed_allocations:
  - allocation_id: "community-fund-allocation"
    allocation_category: "community_fund"
    beneficiary_id: "community-fund-001"
    calculation_mode: "fixed_rate"
    fixed_rate: 0.01
    evidence_required: true

  - allocation_id: "platform-operating-fee"
    allocation_category: "platform_fee"
    beneficiary_id: "platform-operator-001"
    calculation_mode: "fixed_rate"
    fixed_rate: 0.04
    evidence_required: true

proportional_allocation:
  source: "approved_contribution_weight_resolution"
  pool_treatment: "remaining_after_fixed_allocations"

  accepted_weight_statuses:
    - "included"
    - "held_for_review"

  held_weight_treatment: "reserve_without_redistribution"

constraints:
  default_minimum_amount: 0
  default_maximum_pool_share: 0.75

  evidence_required_for_override: true
  human_approval_required_for_override: true

rounding:
  method: "half_up"
  decimal_places: 0

remainder:
  strategy: "largest_remainder"
  allow_unexplained_remainder: false

prohibited_rules:
  - "create_new_beneficiary_without_evidence"
  - "change_approved_weight_without_superseding_resolution"
  - "redistribute_held_weight"
  - "increase_share_for_visibility"
  - "increase_share_for_job_title"
  - "increase_share_for_platform_ownership"
  - "hide_platform_fee"
  - "convert_plan_directly_to_payment"
  - "allow_agent_self_allocation"

approval:
  human_review_required: true
