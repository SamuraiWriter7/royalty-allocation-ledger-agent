name: Validate Allocation Ledger Records

on:
  push:
    branches:
      - main
    paths:
      - "schemas/**"
      - "examples/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/validate.yml"

  pull_request:
    paths:
      - "schemas/**"
      - "examples/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/validate.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate schemas and examples
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate allocation ledger examples
        run: |
          python scripts/validate_examples.py
