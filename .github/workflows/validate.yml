name: Validate examples

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema PyYAML

      - name: Validate v0.1 allocation ledger
        run: python scripts/validate_allocation_ledger.py

      - name: Validate v0.2 contribution weights
        run: python scripts/validate_contribution_weights.py

      - name: Validate v0.3 multi-beneficiary plan
        run: python scripts/validate_multi_beneficiary_plan.py
